<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>心境花园 · 交互网页演示</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{
  min-height:100vh;
  font-family:"Inter","PingFang SC","Microsoft YaHei",sans-serif;
  color:#f7f4ff;
  background:
    radial-gradient(circle at 18% 18%,rgba(139,198,170,.34),transparent 28%),
    radial-gradient(circle at 82% 12%,rgba(171,126,255,.3),transparent 30%),
    linear-gradient(135deg,#081512 0%,#151126 52%,#0a101c 100%);
  display:flex;
  align-items:center;
  justify-content:center;
  padding:32px 18px;
}
.page{
  width:min(1080px,100%);
}
.topbar{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:16px;
  margin-bottom:22px;
}
a{
  color:#f7f4ff;
  text-decoration:none;
}
.back{
  display:inline-flex;
  align-items:center;
  border:1px solid rgba(255,255,255,.28);
  background:rgba(255,255,255,.1);
  border-radius:999px;
  padding:10px 16px;
  backdrop-filter:blur(12px);
}
.label{
  color:#c7f3db;
  font-size:12px;
  letter-spacing:2px;
  text-transform:uppercase;
}
h1{
  font-size:clamp(34px,6vw,72px);
  line-height:1;
  margin:12px 0 14px;
  letter-spacing:0;
}
.intro{
  max-width:760px;
  color:rgba(247,244,255,.78);
  font-size:clamp(15px,2vw,18px);
  line-height:1.8;
  margin-bottom:28px;
}
.video-shell{
  border:1px solid rgba(255,255,255,.22);
  background:rgba(5,9,18,.48);
  border-radius:18px;
  padding:12px;
  box-shadow:0 28px 70px rgba(0,0,0,.38);
  backdrop-filter:blur(18px);
}
video{
  width:100%;
  display:block;
  border-radius:12px;
  background:#050912;
  aspect-ratio:16/9;
}
.note{
  color:rgba(247,244,255,.62);
  font-size:13px;
  margin-top:14px;
  line-height:1.7;
}
@media(max-width:720px){
  body{align-items:flex-start;padding-top:22px}
  .topbar{align-items:flex-start;flex-direction:column}
  .video-shell{border-radius:14px;padding:8px}
  video{border-radius:9px}
}
</style>
</head>
<body>
<main class="page">
  <div class="topbar">
    <a class="back" href="../index.html">← 返回作品集</a>
    <div class="label">Mood Garden Interactive Web Demo</div>
  </div>
  <section>
    <div class="label">心境花园</div>
    <h1>情绪在花园中生长</h1>
    <p class="intro">这是“心境花园”交互网页的演示视频。作品将心境表达转译为花园中的视觉反馈，让情绪以更柔和、可感知的方式被看见。</p>
  </section>
  <div class="video-shell">
    <video controls preload="metadata" playsinline src="mood-garden-demo.mp4"></video>
  </div>
  <p class="note">如果浏览器没有自动加载视频，请点击播放器中的播放按钮。上传 GitHub 时保持本页面和视频文件在同一文件夹即可。</p>
</main>
</body>
</html>
